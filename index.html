<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="description" content="Diario Pedagógico - I.E. Rural Miguel Pinedo Barros" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Diario Pedagógico MPB</title>
  </head>
  <body class="bg-surface text-white antialiased">
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;font-family:monospace;font-size:12px;background:#fff;color:#b91c1c;white-space:pre-wrap;word-break:break-all">'
          + '<b>ERROR AL CARGAR LA APP:</b>\n\n'
          + msg + '\n\nArchivo: ' + src + ':' + line
          + '\n\nStack:\n' + (err && err.stack ? err.stack : 'no disponible')
          + '\n\n<i>Copia este texto para diagnosticar.</i></div>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
